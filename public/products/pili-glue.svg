<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#f0faf7"/>
  <rect width="400" height="400" rx="24" fill="url(#grad4)" opacity="0.25"/>
  
  <!-- Glue bottle body -->
  <path d="M155,150 L155,310 Q155,330 175,330 L225,330 Q245,330 245,310 L245,150 Z" fill="#0d4d4d"/>
  <path d="M158,153 L158,307 Q158,325 175,325 L225,325 Q242,325 242,307 L242,153 Z" fill="url(#glueGrad)"/>
  
  <!-- Bottle neck -->
  <rect x="175" y="110" width="50" height="45" rx="6" fill="#0d4d4d"/>
  <rect x="178" y="113" width="44" height="39" rx="5" fill="#145e5e"/>
  
  <!-- Squeeze top -->
  <path d="M185,110 L185,85 Q185,75 200,75 Q215,75 215,85 L215,110" fill="#1a8a6e"/>
  <ellipse cx="200" cy="75" rx="15" ry="8" fill="#25a080"/>
  
  <!-- Drip from nozzle -->
  <ellipse cx="200" cy="68" rx="4" ry="5" fill="#3ecbac" opacity="0.8"/>
  <path d="M200,63 Q198,55 200,50" stroke="#3ecbac" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  
  <!-- Label -->
  <rect x="165" y="180" width="70" height="100" rx="6" fill="white" opacity="0.92"/>
  <text x="200" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d4d4d" font-family="Arial">PILI</text>
  <text x="200" y="230" text-anchor="middle" font-size="11" fill="#1a8a6e" font-family="Arial">GLUE</text>
  <rect x="175" y="240" width="50" height="3" rx="1.5" fill="#3ecbac"/>
  <text x="200" y="258" text-anchor="middle" font-size="7" fill="#666" font-family="Arial">FAST BOND</text>
  <text x="200" y="270" text-anchor="middle" font-size="7" fill="#666" font-family="Arial">CLEAR FINISH</text>
  
  <!-- Speed lines -->
  <line x1="280" y1="140" x2="340" y2="140" stroke="#3ecbac" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="290" y1="155" x2="330" y2="155" stroke="#3ecbac" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="285" y1="170" x2="335" y2="170" stroke="#3ecbac" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Clock/speed icon -->
  <circle cx="310" cy="210" r="22" fill="none" stroke="#0d4d4d" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="210" x2="310" y2="195" stroke="#1a8a6e" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="310" y1="210" x2="320" y2="215" stroke="#3ecbac" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Clear/transparent icon -->
  <circle cx="80" cy="200" r="18" fill="none" stroke="#3ecbac" stroke-width="2" opacity="0.4"/>
  <circle cx="80" cy="200" r="10" fill="none" stroke="#3ecbac" stroke-width="1" opacity="0.3"/>
  <path d="M72,192 L88,208" stroke="#3ecbac" stroke-width="1.5" opacity="0.3"/>
  <path d="M72,208 L88,192" stroke="#3ecbac" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Drips at bottom for decoration -->
  <ellipse cx="120" cy="350" rx="8" ry="10" fill="#3ecbac" opacity="0.2"/>
  <ellipse cx="300" cy="360" rx="6" ry="8" fill="#3ecbac" opacity="0.15"/>
  <ellipse cx="330" cy="340" rx="5" ry="6" fill="#0d4d4d" opacity="0.1"/>
  
  <!-- Viscosity lines -->
  <path d="M60,270 Q70,275 60,280 Q50,285 60,290 Q70,295 60,300" stroke="#3ecbac" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <defs>
    <linearGradient id="grad4" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3ecbac" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d4d4d" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="glueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d6060"/>
      <stop offset="50%" stop-color="#1a8a6e"/>
      <stop offset="100%" stop-color="#0d5050"/>
    </linearGradient>
  </defs>
</svg>
