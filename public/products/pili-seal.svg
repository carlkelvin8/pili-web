<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#f0faf7"/>
  <rect width="400" height="400" rx="24" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Tube body -->
  <rect x="140" y="100" width="80" height="200" rx="12" fill="#0d4d4d"/>
  <rect x="145" y="105" width="70" height="190" rx="10" fill="url(#tubeGrad)"/>
  
  <!-- Tube cap/nozzle -->
  <polygon points="180,80 160,100 200,100" fill="#1a8a6e"/>
  <rect x="170" y="60" width="20" height="25" rx="4" fill="#0d4d4d"/>
  
  <!-- Sealant bead coming out -->
  <path d="M180,60 Q175,40 185,30 Q190,20 180,15" stroke="#3ecbac" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="180" cy="15" r="5" fill="#3ecbac" opacity="0.8"/>
  
  <!-- Label on tube -->
  <rect x="150" y="150" width="60" height="80" rx="4" fill="white" opacity="0.9"/>
  <text x="180" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d4d4d" font-family="Arial">PILI</text>
  <text x="180" y="198" text-anchor="middle" font-size="10" fill="#1a8a6e" font-family="Arial">SEAL</text>
  <rect x="158" y="206" width="44" height="3" rx="1.5" fill="#3ecbac"/>
  
  <!-- Decorative seal ring -->
  <circle cx="180" cy="350" r="30" fill="none" stroke="#3ecbac" stroke-width="3" opacity="0.4"/>
  <circle cx="180" cy="350" r="20" fill="none" stroke="#0d4d4d" stroke-width="2" opacity="0.3"/>
  
  <!-- Water drops (representing waterproof) -->
  <path d="M280,180 Q285,170 280,160 Q275,170 280,180Z" fill="#3ecbac" opacity="0.6"/>
  <path d="M300,210 Q305,200 300,190 Q295,200 300,210Z" fill="#3ecbac" opacity="0.4"/>
  <path d="M270,230 Q275,220 270,210 Q265,220 270,230Z" fill="#3ecbac" opacity="0.5"/>
  
  <!-- Shield icon (representing protection) -->
  <path d="M310,120 L310,145 Q310,165 290,175 Q270,165 270,145 L270,120 Q290,110 310,120Z" fill="none" stroke="#0d4d4d" stroke-width="2" opacity="0.4"/>
  <path d="M285,140 L290,145 L300,135" stroke="#3ecbac" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ecbac" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d4d4d" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d6d6d"/>
      <stop offset="50%" stop-color="#1a8a6e"/>
      <stop offset="100%" stop-color="#0d5555"/>
    </linearGradient>
  </defs>
</svg>
