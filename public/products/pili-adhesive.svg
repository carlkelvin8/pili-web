<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#f0faf7"/>
  <rect width="400" height="400" rx="24" fill="url(#grad2)" opacity="0.3"/>
  
  <!-- Bottle body -->
  <rect x="150" y="130" width="100" height="180" rx="16" fill="#0d4d4d"/>
  <rect x="155" y="135" width="90" height="170" rx="14" fill="url(#bottleGrad)"/>
  
  <!-- Bottle neck -->
  <rect x="175" y="95" width="50" height="40" rx="6" fill="#0d4d4d"/>
  <rect x="178" y="98" width="44" height="34" rx="5" fill="#145e5e"/>
  
  <!-- Cap -->
  <rect x="172" y="75" width="56" height="25" rx="8" fill="#1a8a6e"/>
  <rect x="177" y="80" width="46" height="15" rx="5" fill="#25a080"/>
  
  <!-- Label -->
  <rect x="162" y="170" width="76" height="100" rx="6" fill="white" opacity="0.92"/>
  <text x="200" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d4d4d" font-family="Arial">PILI</text>
  <text x="200" y="220" text-anchor="middle" font-size="10" fill="#1a8a6e" font-family="Arial">ADHESIVE</text>
  <rect x="172" y="230" width="56" height="3" rx="1.5" fill="#3ecbac"/>
  <text x="200" y="252" text-anchor="middle" font-size="7" fill="#666" font-family="Arial">INDUSTRIAL</text>
  <text x="200" y="262" text-anchor="middle" font-size="7" fill="#666" font-family="Arial">STRENGTH</text>
  
  <!-- Bond illustration - two pieces joining -->
  <rect x="60" y="180" width="50" height="20" rx="3" fill="#0d4d4d" opacity="0.5"/>
  <rect x="60" y="220" width="50" height="20" rx="3" fill="#0d4d4d" opacity="0.5"/>
  <path d="M75,200 Q85,210 75,220" stroke="#3ecbac" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M95,200 Q105,210 95,220" stroke="#3ecbac" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Chain link icon -->
  <ellipse cx="320" cy="180" rx="20" ry="12" fill="none" stroke="#3ecbac" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="340" cy="180" rx="20" ry="12" fill="none" stroke="#0d4d4d" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Strength lines -->
  <line x1="300" y1="240" x2="350" y2="240" stroke="#3ecbac" stroke-width="2" opacity="0.4"/>
  <line x1="305" y1="250" x2="345" y2="250" stroke="#3ecbac" stroke-width="2" opacity="0.3"/>
  <line x1="310" y1="260" x2="340" y2="260" stroke="#3ecbac" stroke-width="2" opacity="0.2"/>
  
  <!-- Molecules -->
  <circle cx="80" cy="130" r="6" fill="#3ecbac" opacity="0.4"/>
  <circle cx="95" cy="120" r="4" fill="#0d4d4d" opacity="0.3"/>
  <line x1="80" y1="130" x2="95" y2="120" stroke="#3ecbac" stroke-width="1.5" opacity="0.3"/>
  <circle cx="70" cy="115" r="5" fill="#3ecbac" opacity="0.3"/>
  <line x1="80" y1="130" x2="70" y2="115" stroke="#0d4d4d" stroke-width="1.5" opacity="0.2"/>
  
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d4d4d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3ecbac" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d6060"/>
      <stop offset="40%" stop-color="#1a7a6a"/>
      <stop offset="100%" stop-color="#0d5050"/>
    </linearGradient>
  </defs>
</svg>
