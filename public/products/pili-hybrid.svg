<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#f0faf7"/>
  <rect width="400" height="400" rx="24" fill="url(#grad3)" opacity="0.25"/>
  
  <!-- Cartridge body -->
  <rect x="130" y="110" width="70" height="220" rx="10" fill="#0d4d4d"/>
  <rect x="134" y="114" width="62" height="212" rx="8" fill="url(#cartGrad)"/>
  
  <!-- Cartridge plunger -->
  <rect x="145" y="320" width="40" height="40" rx="4" fill="#0a3333"/>
  <rect x="155" y="355" width="20" height="25" rx="3" fill="#0d4d4d"/>
  
  <!-- Nozzle -->
  <polygon points="165,110 135,90 195,90" fill="#1a8a6e"/>
  <rect x="155" y="60" width="20" height="35" rx="3" fill="#145e5e"/>
  <polygon points="165,60 158,45 172,45" fill="#0d4d4d"/>
  
  <!-- Hybrid bead - wavy (representing flexibility + adhesion) -->
  <path d="M165,45 Q155,30 165,20 Q175,10 165,0" stroke="#3ecbac" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M165,45 Q175,32 165,22" stroke="#1a8a6e" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  
  <!-- Label -->
  <rect x="138" y="160" width="54" height="90" rx="4" fill="white" opacity="0.9"/>
  <text x="165" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d4d4d" font-family="Arial">PILI</text>
  <text x="165" y="200" text-anchor="middle" font-size="8" fill="#1a8a6e" font-family="Arial">HYBRID</text>
  <text x="165" y="213" text-anchor="middle" font-size="7" fill="#1a8a6e" font-family="Arial">SEALANT</text>
  <rect x="145" y="220" width="40" height="2.5" rx="1" fill="#3ecbac"/>
  <text x="165" y="237" text-anchor="middle" font-size="6" fill="#666" font-family="Arial">SEAL + BOND</text>
  
  <!-- Flexibility wave illustration -->
  <path d="M240,160 Q260,145 280,160 Q300,175 320,160 Q340,145 360,160" stroke="#3ecbac" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M240,185 Q260,170 280,185 Q300,200 320,185 Q340,170 360,185" stroke="#0d4d4d" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Hybrid symbol (two circles merging) -->
  <circle cx="290" cy="250" r="25" fill="#3ecbac" opacity="0.2"/>
  <circle cx="310" cy="250" r="25" fill="#0d4d4d" opacity="0.2"/>
  <path d="M300,230 L300,270" stroke="white" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Plus signs representing hybrid nature -->
  <text x="300" y="255" text-anchor="middle" font-size="16" fill="#1a8a6e" opacity="0.6" font-family="Arial">+</text>
  
  <!-- Spring/elastic illustration -->
  <path d="M270,300 Q280,290 290,300 Q300,310 310,300 Q320,290 330,300 Q340,310 350,300" stroke="#3ecbac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Joint illustration -->
  <rect x="255" y="330" width="40" height="12" rx="2" fill="#0d4d4d" opacity="0.4"/>
  <rect x="305" y="330" width="40" height="12" rx="2" fill="#0d4d4d" opacity="0.4"/>
  <rect x="293" y="328" width="16" height="16" rx="3" fill="#3ecbac" opacity="0.5"/>
  
  <defs>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ecbac" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d4d4d" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d5e5e"/>
      <stop offset="50%" stop-color="#1a8a6e"/>
      <stop offset="100%" stop-color="#0d5555"/>
    </linearGradient>
  </defs>
</svg>
